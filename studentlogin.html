<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;

    background-image: url('studentbackground.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    text-align: center;

    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

h2 {
    color: #333;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;

    border: 1px solid #ccc;
    border-radius: 6px;

    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;

    border: none;
    border-radius: 6px;

    background: #007bff;
    color: white;

    font-size: 16px;
    cursor: pointer;

    transition: 0.3s;
}

button:hover {
    background: #0056b3;
}

p {
    color: #333;
}

a {
    text-decoration: none;
    color: #007bff;
    font-weight: bold;
}

a:hover {
    text-decoration: underline;
}

</style>
</head>

<body>

<div class="box">

    <h2>Student Login</h2>

    <form action="StudentLoginServlet" method="post">

        <input type="text" 
               name="email" 
               placeholder="Enter Email" 
               required>

        <input type="password" 
               name="password" 
               placeholder="Enter Password" 
               required>

        <button type="submit">Login</button>

    </form>

    <p>
        Don't have an account?
        <a href="student.html">Register</a>
    </p>

</div>

</body>
</html>

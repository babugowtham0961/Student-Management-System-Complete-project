<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Logo Splash Screen</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body{
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      overflow: hidden;
    }

    .splash-container{
      text-align: center;
      animation: fadeIn 1.5s ease-in-out;
    }

    .logo{
      width: 180px;
      height: 180px;
      object-fit: contain;
      animation: zoomIn 2s ease-in-out;
    }

    h1{
      margin-top: 15px;
      color: white;
      font-size: 32px;
      letter-spacing: 2px;
    }

    @keyframes zoomIn{
      from{
        transform: scale(0.5);
        opacity: 0;
      }
      to{
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes fadeIn{
      from{
        opacity: 0;
      }
      to{
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <!-- Replace logo.png with your logo image -->
    <img src="logo.jpg" alt="Logo" class="logo">

    <h1>Student Management System Project</h1>
  </div>

  <script>
    // Redirect to role.html after 5 seconds
    setTimeout(() => {
      window.location.href = "role.html";
    }, 5000);
  </script>

</body>
</html>
